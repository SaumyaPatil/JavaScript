<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-size: larger;
        }
    </style>
</head>
<body>
    <p>Namaste Dunia</p>

    <!-- Script tag can be added in head tag or in the beginning of body tag or in the end of it but its always an optimal practice to add 
    it at the end of the body tag as to let the component render on screen and then add the behaviour to it. -->

    <!-- This is inline js. But for modularity and better readablity, its a good practice to add the script inside another js file and 
    import it here. -->
    <script>console.log("Hello jee kaise ho saare!")</script>
    <script src="script.js"></script>
</body>
</html>
